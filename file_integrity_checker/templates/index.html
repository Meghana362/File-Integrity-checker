<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>File Integrity Checker</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <svg class="shield-icon" viewBox="0 0 36 36" fill="none">
        <path d="M18 3L5 8v10c0 8.3 5.6 15.8 13 18 7.4-2.2 13-9.7 13-18V8L18 3z"
              fill="#1e40af" stroke="#38bdf8" stroke-width="1.5"/>
        <path d="M13 18l3.5 3.5 7-7" stroke="#38bdf8" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="title-block">
        <h1>File Integrity Checker</h1>
        <p class="subtitle">SECURITY MONITORING SYSTEM</p>
      </div>
    </div>
    <div class="status-badge">
      <span class="pulse-dot"></span>
      SYSTEM ACTIVE
    </div>
  </header>

  <!-- STATS -->
  <section class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-label">TOTAL FILES
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>
      </div>
      <div class="stat-val blue" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">SAFE
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M12 2L3 7v5c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V7l-9-5z"/><polyline points="9 12 11 14 15 10"/></svg>
      </div>
      <div class="stat-val green" id="statSafe">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">MODIFIED
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2"><path d="M12 2L3 7v5c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V7l-9-5z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="stat-val red" id="statModified">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">INTEGRITY
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="stat-val blue" id="statIntegrity">100%</div>
    </div>
  </section>

  <!-- MAIN -->
  <div class="main-grid">

    <!-- LEFT COLUMN -->
    <div class="left-col">

      <!-- UPLOAD -->
      <div class="card">
        <div class="card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
          UPLOAD FILE
        </div>
        <div class="drop-zone" id="dropZone">
          <div id="dropContent">
            <div class="drop-icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="12 18 12 12"/><polyline points="9 15 12 12 15 15"/></svg>
            </div>
            <div class="drop-text">Drag &amp; drop a file here, or click to browse</div>
            <button class="choose-btn" id="chooseBtn">Choose File</button>
          </div>
        </div>
        <input type="file" id="fileInput" style="display:none" />
        <div id="uploadMsg" class="upload-msg"></div>
      </div>

      <!-- FILE TABLE -->
      <div class="card">
        <div class="card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          FILE STATUS
        </div>
        <div class="table-wrap">
          <table id="fileTable">
            <thead>
              <tr>
                <th>FILE NAME</th>
                <th>SIZE</th>
                <th>LAST CHECKED</th>
                <th>STATUS</th>
              </tr>
            </thead>
            <tbody id="fileTableBody"></tbody>
          </table>
          <div id="emptyTable" class="empty-table">NO FILES MONITORED — Upload a file to begin scanning</div>
        </div>
      </div>

    </div>

    <!-- RIGHT: ALERTS -->
    <div class="alerts-panel card">
      <div class="alerts-header">
        <div class="card-title" style="margin:0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          SECURITY ALERTS
        </div>
        <span class="alert-count-badge" id="alertBadge">0</span>
      </div>
      <div id="alertList"></div>
    </div>

  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
